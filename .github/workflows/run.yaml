name: Generate Loon Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Loon rules
        run: node scripts/generate-loon-ruleset.mjs

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated Loon rules"
          file_pattern: dist/loon/*.list