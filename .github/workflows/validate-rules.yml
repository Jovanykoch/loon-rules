name: Validate Rules

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python scripts/validate_rules.py