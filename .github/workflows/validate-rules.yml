name: Validate Rules

on:
  pull_request:
    paths:
      - 'rules/*.list'
      - 'scripts/validate_rules.py'
      - '.github/workflows/validate-rules.yml'
  push:
    branches:
      - main
    paths:
      - 'rules/*.list'
      - 'scripts/validate_rules.py'
      - '.github/workflows/validate-rules.yml'

permissions:
  contents: read

jobs:
  validate-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate rule formats
        run: python scripts/validate_rules.py
